naftiko: 1.0.0-alpha2
info:
  label: Pandium Runs Health Monitor
  description: Health-monitor bridge that walks every Pandium tenant, lists their recent runs, and surfaces failed or stale syncs so Naftiko's OTel + Prometheus pipeline can emit governance events on top of Pandium's run observability. Designed for periodic polling from a Naftiko capability container.
  tags:
  - Pandium
  - Runs
  - Observability
  - Health
  - Naftiko
  created: '2026-05-21'
  modified: '2026-05-21'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-runs-health
    baseUri: https://api.pandium.io
    description: Pandium tenants + runs surface for health monitoring.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: listtenants
        method: GET
        description: List every Pandium tenant under this account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: v2-tenants-tenant_id-runs
      path: /v2/tenants/{tenant_id}/runs
      operations:
      - name: listtenantruns
        method: GET
        description: List runs for a tenant — used to detect failed or stale syncs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
        - name: status
          in: query
          type: string
          description: Filter by run status (pending, running, completed, failed).
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-runs-health-rest
    port: 8080
    description: REST adapter for the Pandium runs health monitor.
    resources:
    - path: /v1/health/tenants
      name: health-tenants
      description: List every Pandium tenant for health inventory.
      operations:
      - method: GET
        name: listtenants
        description: List every Pandium tenant under this account.
        call: pandium-runs-health.listtenants
        with:
          skip: rest.skip
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/health/tenants/{tenant-id}/runs
      name: health-tenant-runs
      description: List runs for a tenant — used to detect failed or stale syncs.
      operations:
      - method: GET
        name: listtenantruns
        description: List runs for a tenant — used to detect failed or stale syncs.
        call: pandium-runs-health.listtenantruns
        with:
          tenant_id: rest.tenant-id
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-runs-health-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing the Pandium runs health monitor for agent-driven incident triage.
    tools:
    - name: pandium-health-list-tenants
      description: List every Pandium tenant under this account for health inventory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-runs-health.listtenants
      with:
        skip: tools.skip
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-health-list-tenant-runs
      description: List runs for a tenant — used to detect failed or stale syncs.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-runs-health.listtenantruns
      with:
        tenant_id: tools.tenant_id
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
