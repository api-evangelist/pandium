naftiko: 1.0.0-alpha2
info:
  label: Pandium API — Tenants
  description: 'Pandium API — Tenants. 4 operations. Lead operation: Pandium List all tenants. Self-contained Naftiko capability
    covering one Pandium business surface.'
  tags:
  - Pandium
  - Tenants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-tenants
    baseUri: https://api.pandium.io
    description: Pandium API — Tenants business capability. Self-contained, no shared references.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: listtenants
        method: GET
        description: Pandium List all tenants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        - name: integration_id
          in: query
          type: integer
          description: Filter tenants by integration ID.
      - name: createtenant
        method: POST
        description: Pandium Create a tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant_id
      path: /v2/tenants/{tenant_id}
      operations:
      - name: gettenant
        method: GET
        description: Pandium Get a single tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetenant
        method: PATCH
        description: Pandium Update a tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-tenants-rest
    port: 8080
    description: REST adapter for Pandium API — Tenants. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/tenants
      name: v2-tenants
      description: REST surface for v2-tenants.
      operations:
      - method: GET
        name: listtenants
        description: Pandium List all tenants
        call: pandium-tenants.listtenants
        with:
          skip: rest.skip
          limit: rest.limit
          integration_id: rest.integration_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtenant
        description: Pandium Create a tenant
        call: pandium-tenants.createtenant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/tenants/{tenant-id}
      name: v2-tenants-tenant-id
      description: REST surface for v2-tenants-tenant_id.
      operations:
      - method: GET
        name: gettenant
        description: Pandium Get a single tenant
        call: pandium-tenants.gettenant
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetenant
        description: Pandium Update a tenant
        call: pandium-tenants.updatetenant
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-tenants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pandium API — Tenants. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: pandium-list-all-tenants
      description: Pandium List all tenants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-tenants.listtenants
      with:
        skip: tools.skip
        limit: tools.limit
        integration_id: tools.integration_id
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-create-tenant
      description: Pandium Create a tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pandium-tenants.createtenant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-get-single-tenant
      description: Pandium Get a single tenant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-tenants.gettenant
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-update-tenant
      description: Pandium Update a tenant
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pandium-tenants.updatetenant
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
