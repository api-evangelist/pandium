naftiko: 1.0.0-alpha2
info:
  label: Pandium Integration Catalog Mirror
  description: Mirror Pandium's integration catalog (integrations + releases) into Naftiko Fleet discovery — every Pandium integration becomes addressable from Naftiko Backstage, apis.io, and the capability registry. Read-only walk of the catalog suitable for periodic sync into a Naftiko discovery surface.
  tags:
  - Pandium
  - Catalog
  - Discovery
  - Fleet
  - Naftiko
  created: '2026-05-21'
  modified: '2026-05-21'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-catalog
    baseUri: https://api.pandium.io
    description: Read-only Pandium catalog surface for Fleet discovery sync.
    resources:
    - name: v2-integrations
      path: /v2/integrations
      operations:
      - name: listintegrations
        method: GET
        description: List every integration available in the Pandium catalog.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: v2-integrations-integration_id-releases
      path: /v2/integrations/{integration_id}/releases
      operations:
      - name: listintegrationreleases
        method: GET
        description: List every release for a given Pandium integration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: integration_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-catalog-rest
    port: 8080
    description: REST adapter for Pandium catalog discovery sync.
    resources:
    - path: /v1/catalog/integrations
      name: catalog-integrations
      description: List every integration in the Pandium catalog.
      operations:
      - method: GET
        name: listintegrations
        description: List every integration available in the Pandium catalog.
        call: pandium-catalog.listintegrations
        with:
          skip: rest.skip
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/catalog/integrations/{integration-id}/releases
      name: catalog-releases
      description: List every release for a given Pandium integration.
      operations:
      - method: GET
        name: listintegrationreleases
        description: List every release for a given Pandium integration.
        call: pandium-catalog.listintegrationreleases
        with:
          integration_id: rest.integration-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-catalog-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing the Pandium catalog as agent-discoverable tools.
    tools:
    - name: pandium-mirror-integrations
      description: List every integration in the Pandium catalog for Fleet discovery sync.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-catalog.listintegrations
      with:
        skip: tools.skip
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-mirror-releases
      description: List every release for a given Pandium integration for Fleet discovery sync.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-catalog.listintegrationreleases
      with:
        integration_id: tools.integration_id
      outputParameters:
      - type: object
        mapping: $.
