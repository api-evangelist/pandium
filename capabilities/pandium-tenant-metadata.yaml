naftiko: 1.0.0-alpha2
info:
  label: Pandium API — Tenant Metadata
  description: 'Pandium API — Tenant Metadata. 2 operations. Lead operation: Pandium Get tenant metadata. Self-contained Naftiko
    capability covering one Pandium business surface.'
  tags:
  - Pandium
  - Tenant Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-tenant-metadata
    baseUri: https://api.pandium.io
    description: Pandium API — Tenant Metadata business capability. Self-contained, no shared references.
    resources:
    - name: v2-tenants-tenant_id-metadata
      path: /v2/tenants/{tenant_id}/metadata
      operations:
      - name: gettenantmetadata
        method: GET
        description: Pandium Get tenant metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetenantmetadata
        method: PATCH
        description: Pandium Update tenant metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-tenant-metadata-rest
    port: 8080
    description: REST adapter for Pandium API — Tenant Metadata. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/tenants/{tenant-id}/metadata
      name: v2-tenants-tenant-id-metadata
      description: REST surface for v2-tenants-tenant_id-metadata.
      operations:
      - method: GET
        name: gettenantmetadata
        description: Pandium Get tenant metadata
        call: pandium-tenant-metadata.gettenantmetadata
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetenantmetadata
        description: Pandium Update tenant metadata
        call: pandium-tenant-metadata.updatetenantmetadata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-tenant-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pandium API — Tenant Metadata. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pandium-get-tenant-metadata
      description: Pandium Get tenant metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pandium-tenant-metadata.gettenantmetadata
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-update-tenant-metadata
      description: Pandium Update tenant metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pandium-tenant-metadata.updatetenantmetadata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
