naftiko: 1.0.0-alpha2
info:
  label: Pandium API
  description: The Pandium API provides programmatic access to native Pandium resources including integrations, tenants, and
    runs. It uses standard REST conventions and HTTP methods, allowing B2B SaaS companies to manage their integration platform,
    trigger syncs, proxy connector calls, and manage tenant metadata.
  tags:
  - Pandium
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: pandium
    baseUri: https://api.pandium.io
    description: Pandium API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{PANDIUM_TOKEN}}'
    resources:
    - name: v2-integrations
      path: /v2/integrations
      operations:
      - name: listintegrations
        method: GET
        description: Pandium List all integrations
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-integrations-integration-id
      path: /v2/integrations/{integration_id}
      operations:
      - name: getintegration
        method: GET
        description: Pandium Get a single integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-integrations-integration-id-releases
      path: /v2/integrations/{integration_id}/releases
      operations:
      - name: listintegrationreleases
        method: GET
        description: Pandium List releases for an integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-integrations-integration-id-releases-release-
      path: /v2/integrations/{integration_id}/releases/{release_id}
      operations:
      - name: getintegrationrelease
        method: GET
        description: Pandium Get a single release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: listtenants
        method: GET
        description: Pandium List all tenants
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        - name: integration_id
          in: query
          type: integer
          description: Filter tenants by integration ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtenant
        method: POST
        description: Pandium Create a tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id
      path: /v2/tenants/{tenant_id}
      operations:
      - name: gettenant
        method: GET
        description: Pandium Get a single tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetenant
        method: PATCH
        description: Pandium Update a tenant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id-sync
      path: /v2/tenants/{tenant_id}/sync
      operations:
      - name: triggertenantsync
        method: POST
        description: Pandium Trigger a sync for a tenant
        inputParameters:
        - name: mode
          in: query
          type: string
          required: true
          description: The sync mode to use.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id-runs
      path: /v2/tenants/{tenant_id}/runs
      operations:
      - name: listtenantruns
        method: GET
        description: Pandium List runs for a tenant
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of records to skip for pagination.
        - name: limit
          in: query
          type: integer
          description: Maximum number of records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id-runs-trigger-id
      path: /v2/tenants/{tenant_id}/runs/{trigger_id}
      operations:
      - name: getrunbytriggerid
        method: GET
        description: Pandium Get run status by trigger ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id-connectors-connector-name-c
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      operations:
      - name: proxyconnectorcall
        method: POST
        description: Pandium Proxy a connector call
        inputParameters:
        - name: connector_name
          in: path
          type: string
          required: true
          description: The name of the connector to call through.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-tenants-tenant-id-metadata
      path: /v2/tenants/{tenant_id}/metadata
      operations:
      - name: gettenantmetadata
        method: GET
        description: Pandium Get tenant metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetenantmetadata
        method: PATCH
        description: Pandium Update tenant metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
