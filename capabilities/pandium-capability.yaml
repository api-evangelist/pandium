    port: 8080
    namespace: pandium-rest
    description: REST adapter for Pandium API.
    resources:
    - path: /v2/integrations
      name: listintegrations
      operations:
      - method: GET
        name: listintegrations
        description: Pandium List all integrations
        call: pandium.listintegrations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/integrations/{integration_id}
      name: getintegration
      operations:
      - method: GET
        name: getintegration
        description: Pandium Get a single integration
        call: pandium.getintegration
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/integrations/{integration_id}/releases
      name: listintegrationreleases
      operations:
      - method: GET
        name: listintegrationreleases
        description: Pandium List releases for an integration
        call: pandium.listintegrationreleases
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/integrations/{integration_id}/releases/{release_id}
      name: getintegrationrelease
      operations:
      - method: GET
        name: getintegrationrelease
        description: Pandium Get a single release
        call: pandium.getintegrationrelease
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants
      name: listtenants
      operations:
      - method: GET
        name: listtenants
        description: Pandium List all tenants
        call: pandium.listtenants
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants
      name: createtenant
      operations:
      - method: POST
        name: createtenant
        description: Pandium Create a tenant
        call: pandium.createtenant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}
      name: gettenant
      operations:
      - method: GET
        name: gettenant
        description: Pandium Get a single tenant
        call: pandium.gettenant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}
      name: updatetenant
      operations:
      - method: PATCH
        name: updatetenant
        description: Pandium Update a tenant
        call: pandium.updatetenant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/sync
      name: triggertenantsync
      operations:
      - method: POST
        name: triggertenantsync
        description: Pandium Trigger a sync for a tenant
        call: pandium.triggertenantsync
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/runs
      name: listtenantruns
      operations:
      - method: GET
        name: listtenantruns
        description: Pandium List runs for a tenant
        call: pandium.listtenantruns
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/runs/{trigger_id}
      name: getrunbytriggerid
      operations:
      - method: GET
        name: getrunbytriggerid
        description: Pandium Get run status by trigger ID
        call: pandium.getrunbytriggerid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      name: proxyconnectorcall
      operations:
      - method: POST
        name: proxyconnectorcall
        description: Pandium Proxy a connector call
        call: pandium.proxyconnectorcall
        with:
          connector_name: rest.connector_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/metadata
      name: gettenantmetadata
      operations:
      - method: GET
        name: gettenantmetadata
        description: Pandium Get tenant metadata
        call: pandium.gettenantmetadata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/tenants/{tenant_id}/metadata
      name: updatetenantmetadata
      operations:
      - method: PATCH
        name: updatetenantmetadata
        description: Pandium Update tenant metadata
        call: pandium.updatetenantmetadata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: pandium-mcp
    transport: http
    description: MCP adapter for Pandium API for AI agent use.
    tools:
    - name: listintegrations
      description: Pandium List all integrations
