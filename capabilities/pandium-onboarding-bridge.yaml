naftiko: 1.0.0-alpha2
info:
  label: Pandium Onboarding Bridge
  description: Composite onboarding capability — provisions a new Pandium tenant for a customer, pushes initial metadata, and triggers the first sync in a single Naftiko-governed call. Bundles tenant create + metadata patch + sync trigger so host SaaS apps can onboard a customer integration in one Naftiko operation.
  tags:
  - Pandium
  - Tenants
  - Onboarding
  - Naftiko
  created: '2026-05-21'
  modified: '2026-05-21'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-onboarding
    baseUri: https://api.pandium.io
    description: Pandium tenant onboarding surface — create tenant, set metadata, trigger first sync.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: createtenant
        method: POST
        description: Create a new Pandium tenant for a customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: integration_id
          in: body
          type: string
          required: true
          description: Pandium integration this tenant subscribes to.
        - name: external_id
          in: body
          type: string
          description: Host SaaS customer identifier mapped to this tenant.
        - name: name
          in: body
          type: string
          description: Display name for the tenant.
    - name: v2-tenants-tenant_id-metadata
      path: /v2/tenants/{tenant_id}/metadata
      operations:
      - name: settenantmetadata
        method: PATCH
        description: Push initial customer metadata onto the new tenant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
        - name: metadata
          in: body
          type: object
          description: Free-form key/value metadata for the tenant.
    - name: v2-tenants-tenant_id-sync
      path: /v2/tenants/{tenant_id}/sync
      operations:
      - name: triggerfirstsync
        method: POST
        description: Kick off the first sync for the newly-provisioned tenant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-onboarding-rest
    port: 8080
    description: REST adapter — single onboarding endpoint that bundles create + metadata + sync.
    resources:
    - path: /v1/onboarding/create-tenant
      name: create-tenant
      description: Provision a new Pandium tenant.
      operations:
      - method: POST
        name: createtenant
        description: Create a new Pandium tenant for a customer.
        call: pandium-onboarding.createtenant
        with:
          integration_id: rest.integration_id
          external_id: rest.external_id
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/onboarding/set-metadata/{tenant-id}
      name: set-metadata
      description: Push initial metadata onto a tenant.
      operations:
      - method: PATCH
        name: settenantmetadata
        description: Push initial customer metadata onto the new tenant.
        call: pandium-onboarding.settenantmetadata
        with:
          tenant_id: rest.tenant-id
          metadata: rest.metadata
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/onboarding/trigger-first-sync/{tenant-id}
      name: trigger-first-sync
      description: Kick off the first sync for a newly-provisioned tenant.
      operations:
      - method: POST
        name: triggerfirstsync
        description: Kick off the first sync for the newly-provisioned tenant.
        call: pandium-onboarding.triggerfirstsync
        with:
          tenant_id: rest.tenant-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-onboarding-mcp
    port: 9090
    transport: http
    description: MCP adapter — onboarding tools for AI-driven tenant provisioning.
    tools:
    - name: pandium-onboard-create-tenant
      description: Provision a new Pandium tenant for a customer.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pandium-onboarding.createtenant
      with:
        integration_id: tools.integration_id
        external_id: tools.external_id
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-onboard-set-metadata
      description: Push initial metadata onto a newly-provisioned tenant.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pandium-onboarding.settenantmetadata
      with:
        tenant_id: tools.tenant_id
        metadata: tools.metadata
      outputParameters:
      - type: object
        mapping: $.
    - name: pandium-onboard-trigger-first-sync
      description: Kick off the first sync for a newly-provisioned tenant.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pandium-onboarding.triggerfirstsync
      with:
        tenant_id: tools.tenant_id
      outputParameters:
      - type: object
        mapping: $.
