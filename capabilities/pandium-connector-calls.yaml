naftiko: 1.0.0-alpha2
info:
  label: Pandium API — Connector Calls
  description: 'Pandium API — Connector Calls. 1 operations. Lead operation: Pandium Proxy a connector call. Self-contained
    Naftiko capability covering one Pandium business surface.'
  tags:
  - Pandium
  - Connector Calls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium-connector-calls
    baseUri: https://api.pandium.io
    description: Pandium API — Connector Calls business capability. Self-contained, no shared references.
    resources:
    - name: v2-tenants-tenant_id-connectors-connector_name-call
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      operations:
      - name: proxyconnectorcall
        method: POST
        description: Pandium Proxy a connector call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connector_name
          in: path
          type: string
          description: The name of the connector to call through.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PANDIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pandium-connector-calls-rest
    port: 8080
    description: REST adapter for Pandium API — Connector Calls. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/tenants/{tenant-id}/connectors/{connector-name}/call
      name: v2-tenants-tenant-id-connectors-connector-name-call
      description: REST surface for v2-tenants-tenant_id-connectors-connector_name-call.
      operations:
      - method: POST
        name: proxyconnectorcall
        description: Pandium Proxy a connector call
        call: pandium-connector-calls.proxyconnectorcall
        with:
          connector_name: rest.connector_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pandium-connector-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pandium API — Connector Calls. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: pandium-proxy-connector-call
      description: Pandium Proxy a connector call
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pandium-connector-calls.proxyconnectorcall
      with:
        connector_name: tools.connector_name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
