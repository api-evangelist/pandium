naftiko: 1.0.0-alpha2
info:
  label: Provision a Pandium-mediated Stripe billing integration
  description: Use Pandium tenants to give each SaaS customer their own scoped Stripe connection; charge events flow back through Pandium runs into the host SaaS via a single Naftiko REST + MCP adapter.
  tags:
  - Pandium
  - Integration
  - Payments
  - stripe
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium
    baseUri: https://api.pandium.com
    description: Pandium API operations consumed by this integration.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: createtenant
        method: POST
        description: Create a Pandium tenant for the SaaS customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-connectors-connector-name-call
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      operations:
      - name: proxyconnectorcall
        method: POST
        description: Proxy a call through the Pandium-managed Stripe connector.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
        - name: connector_name
          in: path
          type: string
          description: Path parameter connector_name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-runs
      path: /v2/tenants/{tenant_id}/runs
      operations:
      - name: listtenantruns
        method: GET
        description: List Stripe-bound Pandium runs for the tenant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-customers-id
      path: /v1/customers/{id}
      operations:
      - name: getcustomer
        method: GET
        description: 'Stripe API: getCustomer'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
    - name: v1-charges
      path: /v1/charges
      operations:
      - name: createcharge
        method: POST
        description: 'Stripe API: createCharge'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: pandium-stripe-mcp
    description: MCP adapter for the pandium-stripe integration.
    tools:
    - name: pandium_stripe
      description: Execute the pandium stripe integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: pandium-stripe-rest
    port: 8080
    description: REST adapter for the pandium-stripe integration.
    resources:
    - path: /pandium-stripe
      name: pandium-stripe
      description: REST surface for the pandium-stripe integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the pandium-stripe integration.
        call: pandium_stripe
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
