- slug: pandium-salesforce
  label: Embed a Salesforce integration in a Pandium tenant
  partner: salesforce
  category: CRM
  use_case: Provision a Pandium tenant for a SaaS customer, then sync Salesforce Contacts / Accounts through Pandium's connector proxy so the host SaaS sees one unified Naftiko adapter instead of raw Salesforce auth.
- slug: pandium-hubspot
  label: Run a HubSpot CRM integration through Pandium
  partner: hubspot
  category: CRM
  use_case: Use Pandium tenants to broker per-customer HubSpot connections; sync HubSpot Contacts and Deals via Pandium's connector proxy so the host SaaS never holds HubSpot tokens directly.
- slug: pandium-netsuite
  label: Pandium-managed NetSuite ERP sync
  partner: netsuite
  category: ERP
  use_case: Use Pandium to broker NetSuite SuiteTalk REST for each SaaS customer; sync Customer + Invoice records through the Pandium connector proxy and observe runs from a single Naftiko surface.
- slug: pandium-quickbooks
  label: Embed QuickBooks Online accounting via Pandium
  partner: quickbooks
  category: Accounting
  use_case: Each SaaS customer connects QuickBooks once through Pandium; the host SaaS posts deposits and invoice updates via Pandium's connector proxy without holding QuickBooks tokens.
- slug: pandium-stripe
  label: Provision a Pandium-mediated Stripe billing integration
  partner: stripe
  category: Payments
  use_case: Use Pandium tenants to give each SaaS customer their own scoped Stripe connection; charge events flow back through Pandium runs into the host SaaS via a single Naftiko REST + MCP adapter.
- slug: pandium-marketo
  label: Embed Marketo lead sync via Pandium
  partner: marketo
  category: Marketing automation
  use_case: Use Pandium to broker each customer's Marketo connection; sync Leads and Program memberships through the Pandium connector proxy without distributing Marketo client secrets to host code.
- slug: pandium-mailchimp
  label: Embed Mailchimp audience sync via Pandium
  partner: mailchimp
  category: Email marketing
  use_case: Connect each SaaS customer's Mailchimp once through Pandium; add and update audience members through the Pandium connector proxy instead of stitching per-customer OAuth into product code.
- slug: pandium-slack
  label: Embed Slack notifications via Pandium
  partner: slack
  category: Collaboration
  use_case: Use Pandium tenants to broker per-customer Slack workspace tokens; post messages and route alerts through the Pandium connector proxy so the host SaaS never stores Slack auth.
- slug: pandium-microsoft-dynamics
  label: Pandium-managed Microsoft Dynamics 365 integration
  partner: microsoft-dynamics
  category: CRM / ERP
  use_case: Broker each SaaS customer's Microsoft Dynamics 365 connection through Pandium; sync Accounts and Opportunities through the Pandium connector proxy with one Naftiko adapter for both Sales and Finance modules.
- slug: pandium-workday
  label: Embed Workday HCM sync via Pandium
  partner: workday
  category: HCM
  use_case: Use Pandium to broker Workday tenants so HR SaaS apps can sync Workers and Positions through the Pandium connector proxy without managing Workday SOAP/REST auth per customer.
- slug: pandium-servicenow
  label: Embed ServiceNow ITSM integration via Pandium
  partner: servicenow
  category: ITSM
  use_case: Broker per-customer ServiceNow instances through Pandium; create and update incidents through the Pandium connector proxy with a unified Naftiko REST + MCP adapter for any host SaaS.
- slug: pandium-zendesk
  label: Embed Zendesk support integration via Pandium
  partner: zendesk
  category: Support
  use_case: Use Pandium to broker per-customer Zendesk subdomains; create tickets and sync users through the Pandium connector proxy with a single Naftiko adapter that runs the same in dev and prod.
