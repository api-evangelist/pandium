naftiko: 1.0.0-alpha2
info:
  label: Embed Workday HCM sync via Pandium
  description: Use Pandium to broker Workday tenants so HR SaaS apps can sync Workers and Positions through the Pandium connector proxy without managing Workday SOAP/REST auth per customer.
  tags:
  - Pandium
  - Integration
  - HCM
  - workday
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
    WORKDAY_API_KEY: WORKDAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium
    baseUri: https://api.pandium.com
    description: Pandium API operations consumed by this integration.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: createtenant
        method: POST
        description: Create a Pandium tenant for the SaaS customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-connectors-connector-name-call
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      operations:
      - name: proxyconnectorcall
        method: POST
        description: Proxy a call through the Pandium-managed Workday connector.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
        - name: connector_name
          in: path
          type: string
          description: Path parameter connector_name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-sync
      path: /v2/tenants/{tenant_id}/sync
      operations:
      - name: triggertenantsync
        method: POST
        description: Trigger a Workday-bound Pandium sync run.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: workday
    baseUri: https://wd2-impl-services1.workday.com
    description: Workday REST API operations consumed by this integration.
    resources:
    - name: ccx-api-v1-workers
      path: /ccx/api/v1/workers
      operations:
      - name: listworkers
        method: GET
        description: 'Workday REST API: listWorkers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: ccx-api-v1-positions
      path: /ccx/api/v1/positions
      operations:
      - name: listpositions
        method: GET
        description: 'Workday REST API: listPositions'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  exposes:
  - type: mcp
    namespace: pandium-workday-mcp
    description: MCP adapter for the pandium-workday integration.
    tools:
    - name: pandium_workday
      description: Execute the pandium workday integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: pandium-workday-rest
    port: 8080
    description: REST adapter for the pandium-workday integration.
    resources:
    - path: /pandium-workday
      name: pandium-workday
      description: REST surface for the pandium-workday integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the pandium-workday integration.
        call: pandium_workday
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
