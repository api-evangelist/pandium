naftiko: 1.0.0-alpha2
info:
  label: Embed QuickBooks Online accounting via Pandium
  description: Each SaaS customer connects QuickBooks once through Pandium; the host SaaS posts deposits and invoice updates via Pandium's connector proxy without holding QuickBooks tokens.
  tags:
  - Pandium
  - Integration
  - Accounting
  - quickbooks
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    PANDIUM_API_KEY: PANDIUM_API_KEY
    QUICKBOOKS_API_KEY: QUICKBOOKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: pandium
    baseUri: https://api.pandium.com
    description: Pandium API operations consumed by this integration.
    resources:
    - name: v2-tenants
      path: /v2/tenants
      operations:
      - name: createtenant
        method: POST
        description: Create a Pandium tenant for the SaaS customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-connectors-connector-name-call
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      operations:
      - name: proxyconnectorcall
        method: POST
        description: Proxy a call through the Pandium-managed QuickBooks connector.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
        - name: connector_name
          in: path
          type: string
          description: Path parameter connector_name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-tenants-tenant-id-sync
      path: /v2/tenants/{tenant_id}/sync
      operations:
      - name: triggertenantsync
        method: POST
        description: Trigger a QuickBooks-bound Pandium sync run.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Path parameter tenant_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: quickbooks
    baseUri: https://quickbooks.api.intuit.com
    description: QuickBooks Online API operations consumed by this integration.
    resources:
    - name: v3-company-realmid-deposit
      path: /v3/company/{realmId}/deposit
      operations:
      - name: createdeposit
        method: POST
        description: 'QuickBooks Online API: createDeposit'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realmId
          in: path
          type: string
          description: Path parameter realmId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v3-company-realmid-invoice
      path: /v3/company/{realmId}/invoice
      operations:
      - name: createinvoice
        method: POST
        description: 'QuickBooks Online API: createInvoice'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realmId
          in: path
          type: string
          description: Path parameter realmId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: pandium-quickbooks-mcp
    description: MCP adapter for the pandium-quickbooks integration.
    tools:
    - name: pandium_quickbooks
      description: Execute the pandium quickbooks integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: pandium-quickbooks-rest
    port: 8080
    description: REST adapter for the pandium-quickbooks integration.
    resources:
    - path: /pandium-quickbooks
      name: pandium-quickbooks
      description: REST surface for the pandium-quickbooks integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the pandium-quickbooks integration.
        call: pandium_quickbooks
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
