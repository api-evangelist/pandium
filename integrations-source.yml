  partner_baseUri: https://yourcompany.suitetalk.api.netsuite.com
  partner_api: NetSuite SuiteTalk REST
  provider_ops:
    - method: POST
      path: /v2/tenants
      name: createTenant
      description: Create a Pandium tenant for the SaaS customer.
    - method: POST
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      name: proxyConnectorCall
      description: Proxy a call through the Pandium-managed NetSuite connector.
    - method: GET
