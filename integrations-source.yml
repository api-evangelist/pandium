# Curated top Pandium integration partners (~12).
# Pandium = embedded integration marketplace for SaaS. Each capability
# wraps a Pandium tenant + connector handoff to a downstream SaaS API
# (CRM, ERP, finance, marketing, support, HR) as a single Naftiko adapter.

# CRM (2)
- partner: salesforce
  name: Embed a Salesforce integration in a Pandium tenant
  category: CRM
  use_case: Provision a Pandium tenant for a SaaS customer, then sync Salesforce Contacts / Accounts through Pandium's connector proxy so the host SaaS sees one unified Naftiko adapter instead of raw Salesforce auth.
  partner_baseUri: https://yourinstance.my.salesforce.com
  partner_api: Salesforce REST API
  provider_ops:
    - method: POST
      path: /v2/tenants
      name: createTenant
      description: Create a Pandium tenant for the SaaS customer.
    - method: POST
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      name: proxyConnectorCall
      description: Proxy a call through the Pandium-managed Salesforce connector.
    - method: POST
      path: /v2/tenants/{tenant_id}/sync
      name: triggerTenantSync
      description: Trigger a tenant-scoped Pandium sync run.
  partner_ops:
    - method: GET
      path: /services/data/v60.0/sobjects/Contact/{id}
      name: getContact
    - method: POST
      path: /services/data/v60.0/sobjects/Contact
      name: createContact
    - method: PATCH
      path: /services/data/v60.0/sobjects/Contact/{id}
      name: updateContact

- partner: hubspot
  name: Run a HubSpot CRM integration through Pandium
  category: CRM
  use_case: Use Pandium tenants to broker per-customer HubSpot connections; sync HubSpot Contacts and Deals via Pandium's connector proxy so the host SaaS never holds HubSpot tokens directly.
  partner_baseUri: https://api.hubapi.com
  partner_api: HubSpot CRM API
  provider_ops:
    - method: POST
      path: /v2/tenants
      name: createTenant
      description: Create a Pandium tenant for the SaaS customer.
    - method: POST
      path: /v2/tenants/{tenant_id}/connectors/{connector_name}/call
      name: proxyConnectorCall
      description: Proxy a call through the Pandium-managed HubSpot connector.
    - method: GET
      path: /v2/tenants/{tenant_id}/runs
      name: listTenantRuns
      description: List Pandium runs for the tenant to inspect sync history.
  partner_ops:
    - method: GET
      path: /crm/v3/objects/contacts/{contactId}
      name: getContact
    - method: POST
      path: /crm/v3/objects/deals
      name: createDeal

